[pytest]
DJANGO_SETTINGS_MODULE = scalea.settings
python_files = tests.py test_*.py *_tests.py

addopts = 
    --reuse-db 
    --cov=. 
    --cov-report=term-missing 
    --cov-report=xml 
    --cov-fail-under=80

markers =
    unit: Unit tests
    models: Tests for database models
    api: Tests for API endpoints (integration tests)