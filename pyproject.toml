[project]
name = "scalea"
version = "0.1.0"
requires-python = "==3.10.*"
dependencies = [
  "Django==4.2.30",
  "djangorestframework==3.17.1",
  "django-cors-headers==4.9.0",
  "python-decouple==3.8",
  "psycopg2-binary==2.9.11",
  "djangorestframework-simplejwt==5.5.0",
]

[project.optional-dependencies]
dev = [
  "ruff==0.15.11",
  "pre-commit==4.5.1",
  "pytest",
  "pytest-cov"
]

[tool.setuptools.packages.find]
include = ["scalea*"]

[tool.ruff]
line-length = 88
target-version = "py310"
exclude = [
  ".git",
  ".venv",
  "venv",
  "node_modules",
  "migrations",
]

[tool.ruff.lint]
# Core + useful strictness for backend projects
select = [
  "E",    # pycodestyle errors
  "F",    # pyflakes
  "W",    # pycodestyle warnings
  "I",    # import sorting
  "B",    # flake8-bugbear
  "UP",   # pyupgrade
  "C90",  # mccabe complexity
  "SIM",  # simplify
  "RET",  # return consistency
  "ARG",  # unused arguments
  "PTH",  # pathlib suggestions
  "RUF",  # ruff-native rules
]
ignore = [
  "E501",   # line length handled by formatter
  "RUF012", # mutable class attrs (can be noisy in Django patterns)
]

# Cyclomatic complexity threshold
mccabe.max-complexity = 10

[tool.ruff.lint.per-file-ignores]
# Django migration files are auto-generated
"**/migrations/*.py" = ["E501", "F401", "F841", "ARG001"]
# Tests often use unused args/fixtures and looser assertions
"**/tests/*.py" = ["ARG001", "S101"]
"manage.py" = ["E402"]

[tool.ruff.format]
quote-style = "single"
indent-style = "space"
line-ending = "auto"
